<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynx Button - Early Careers</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo.png" />
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <form id="search">
      <span id="searchBorder">
        <img
          id="searchImg"
          src="assets/seatch.png"
          alt=""
          role="presentation"
        />
        <input
          type="text"
          id="postcodeInput"
          placeholder="Search for restaurants..."
          autocomplete="off"
        />
      </span>
      <button type="submit">Submit</button>
    </form>
    <div id="app">
      <p id="info">
        Search for restaurants in a specific postcode with the search bar above!
      </p>
    </div>
    <script type="module" src="/bundle.js"></script>
  </body>
</html>
